{% extends "base.html" %}

{% block title %}Письмо отправлено{% endblock %}

{% block content %}
<div class="container text-center" style="max-width: 620px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
            <i class="bi bi-envelope-check text-primary" style="font-size: 56px;"></i>

            <h1 class="fw-bold mt-3">Проверьте почту</h1>

            <p class="text-muted">
                Если пользователь с таким email существует, ссылка для восстановления пароля отправлена.
            </p>

            <a href="{% url 'login' %}" class="btn btn-primary mt-3">
                Вернуться ко входу
            </a>
        </div>
    </div>
</div>
{% endblock %}
