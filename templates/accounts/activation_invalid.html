{% extends "base.html" %}

{% block title %}Ошибка подтверждения{% endblock %}

{% block content %}
<div class="container text-center" style="max-width: 620px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
            <i class="bi bi-x-circle text-danger" style="font-size:60px;"></i>

            <h1 class="fw-bold mt-3">Ссылка недействительна</h1>

            <p class="text-muted">
                Ссылка подтверждения устарела или уже была использована.
            </p>

            <a href="{% url 'login' %}" class="btn btn-primary mt-3">
                Вернуться ко входу
            </a>
        </div>
    </div>
</div>
{% endblock %}
