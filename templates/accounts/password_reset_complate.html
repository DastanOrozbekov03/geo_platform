{% extends "base.html" %}

{% block title %}Пароль изменён{% endblock %}

{% block content %}
<div class="container text-center" style="max-width: 620px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
            <i class="bi bi-check-circle text-success" style="font-size: 56px;"></i>

            <h1 class="fw-bold mt-3">Пароль успешно изменён</h1>

            <p class="text-muted">
                Теперь вы можете войти в систему с новым паролем.
            </p>

            <a href="{% url 'login' %}" class="btn btn-primary mt-3">
                Войти
            </a>
        </div>
    </div>
</div>
{% endblock %}
