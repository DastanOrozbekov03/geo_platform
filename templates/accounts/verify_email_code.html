{% extends "base.html" %}

{% block title %}Подтверждение email{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 520px;">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4 text-center">

            <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                 style="width:64px;height:64px;">
                <i class="bi bi-envelope-check fs-2"></i>
            </div>

            <h2 class="fw-bold">Введите код</h2>

            <p class="text-muted">
                Мы отправили 6-значный код на почту:
                <br>
                <strong>{{ email }}</strong>
            </p>

            <form method="post">
                {% csrf_token %}

                <input type="text"
                       name="code"
                       maxlength="6"
                       class="form-control form-control-lg text-center rounded-4 mb-3"
                       placeholder="000000"
                       required>

                <button class="btn btn-primary w-100 rounded-4">
                    Подтвердить
                </button>
            </form>

            <div class="text-center mt-3">

                <small class="text-muted">
                    Не получили код?
                </small>

                <br>

                <a href="{% url 'resend_email_code' %}"
                class="text-decoration-none fw-semibold">

                    Отправить повторно
                </a>

            </div>
        </div>
    </div>
</div>
{% endblock %}
