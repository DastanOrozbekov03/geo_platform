{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="container" style="max-width: 560px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <h1 class="fw-bold mb-2">
                <i class="bi bi-key text-primary"></i>
                Восстановление пароля
            </h1>

            <p class="text-muted mb-4">
                Введите email, указанный при регистрации. Мы отправим ссылку для восстановления пароля.
            </p>

            <form method="post">
                {% csrf_token %}

                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control mb-3" required placeholder="example@mail.com">

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-envelope"></i>
                    Отправить ссылку
                </button>
            </form>

            <div class="mt-3 text-center">
                <a href="{% url 'login' %}" class="text-decoration-none">
                    Вернуться ко входу
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
