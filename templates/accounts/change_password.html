{% extends "base.html" %}

{% block title %}Смена пароля{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card border-0 shadow-sm rounded-4 mx-auto"
         style="max-width:600px;">

        <div class="card-body p-4">

            <div class="mb-4">
                <h2 class="fw-bold">
                    Смена пароля
                </h2>

                <p class="text-muted mb-0">
                    Для безопасности используйте сложный пароль.
                </p>
            </div>

            <form method="post">
                {% csrf_token %}

                {% for field in form %}
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            {{ field.label }}
                        </label>

                        {{ field }}

                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors }}
                            </div>
                        {% endif %}

                    </div>
                {% endfor %}

                <button class="btn btn-primary rounded-pill px-4">
                    <i class="bi bi-check-circle me-1"></i>
                    Изменить пароль
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
